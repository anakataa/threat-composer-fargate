server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets (JS/CSS/images) produced by the build are content-hashed
    # in their filenames (e.g. main.a1b2c3.js), so it's safe to cache them
    # aggressively - a new deploy produces new filenames automatically.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html itself - it's the one file that must always be
    # re-fetched so users pick up new deployments instead of an old cached
    # shell referencing stale asset filenames.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Lightweight endpoint for container/ALB health checks - avoids serving
    # the full SPA just to verify the container is alive.
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}